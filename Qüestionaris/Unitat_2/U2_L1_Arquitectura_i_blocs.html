<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarregador de Qüestionari Moodle - U2 L1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .tech-gradient {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glow-sapphire {
            box-shadow: 0 0 30px rgba(2, 132, 199, 0.2);
        }
    </style>
</head>

<body class="bg-[#0f172a] min-h-screen flex items-center justify-center p-6 text-slate-200">
    <div class="max-w-xl w-full">
        <!-- Main Container -->
        <div class="glass-card rounded-[2.5rem] shadow-2xl overflow-hidden glow-sapphire">
            <!-- Header -->
            <div class="tech-gradient p-10 text-white relative">
                <div class="absolute top-0 right-0 p-8 opacity-20">
                    <svg class="w-20 h-20" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M4 6h16v12H4V6m0-2a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2H4m1 3h2v2H5V7m3 0h2v2H8V7m3 0h2v2h-2V7m-6 3h2v2H5v-2m3 0h2v2H8v-2m3 0h2v2h-2v-2m3-3h2v2h-2V7m3 3h2v2h-2v-2m-3 3h2v2h-2v-2m3 0h2v2h-2v-2" />
                    </svg>
                </div>
                <div class="relative z-10">
                    <h2 class="text-sm font-bold uppercase tracking-[0.2em] mb-2 opacity-80">Unitat 2 / Lliçó 1</h2>
                    <h1 class="text-4xl font-extrabold tracking-tight">Arquitectura i Blocs (U2)</h1>
                </div>
            </div>

            <!-- Content -->
            <div class="p-10 space-y-8">
                <div class="flex items-center justify-between text-sm">
                    <div
                        class="flex items-center space-x-2 bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700">
                        <span class="w-2 h-2 rounded-full bg-sky-500 animate-pulse"></span>
                        <span class="font-medium">12 Preguntes</span>
                    </div>
                    <div class="text-slate-400">Nivell: <span class="text-slate-100 font-semibold">Mitjà
                            Conceptual</span></div>
                </div>

                <div class="space-y-4">
                    <div class="flex items-start space-x-4 p-4 rounded-3xl bg-slate-800/30 border border-slate-700/50">
                        <div class="p-3 bg-sky-500/10 rounded-2xl text-sky-500">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                                </path>
                            </svg>
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-100">Von Neumann i Sistemes</h4>
                            <p class="text-sm text-slate-400 leading-relaxed">Fonaments de l'arquitectura, CPU, memòria
                                i flux de dades E/S.</p>
                        </div>
                    </div>

                    <div class="flex items-start space-x-4 p-4 rounded-3xl bg-slate-800/30 border border-slate-700/50">
                        <div class="p-3 bg-indigo-500/10 rounded-2xl text-indigo-500">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                            </svg>
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-100">Components Clau</h4>
                            <p class="text-sm text-slate-400 leading-relaxed">Registres, freqüència, volatilitat i
                                connectors de la placa.</p>
                        </div>
                    </div>
                </div>

                <!-- Action -->
                <button id="downloadBtn"
                    class="w-full tech-gradient hover:brightness-110 text-white font-bold py-5 rounded-[2rem] shadow-[0_10px_40px_-10px_rgba(2,132,199,0.3)] transform transition-active active:scale-95 flex items-center justify-center text-xl tracking-tight">
                    <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    DESCÀRREGA XML U2_L1
                </button>

                <p class="text-center text-slate-500 text-xs font-medium uppercase tracking-widest italic pt-4">
                    Manteniment d'Equips · Unitat 2 (L1)</p>
            </div>
        </div>
    </div>

    <script>
        const xmlContent = `<?xml version="1.0" encoding="UTF-8"?>
<quiz>
  <question type="category"><category><text><![CDATA[$course$/top/Unitat 2/Lliçó 1]]></text></category></question>
  <question type="multichoice"><name><text><![CDATA[U2 L1 Q01 Model Von Neumann]]></text></name><questiontext format="html"><text><![CDATA[<p>CPU, Memòria i Entrada/Sortida?</p>]]></text></questiontext><answer fraction="100"><text><![CDATA[Sí, és el cor de l'arquitectura.]]></text></answer></question>
  <question type="truefalse"><name><text><![CDATA[U2 L1 Q02 Bus de Sistema]]></text></name><questiontext format="html"><text><![CDATA[<p>Interconnecta CPU, memòria i perifèrics?</p>]]></text></questiontext><answer fraction="100"><text>true</text></answer></question>
  <question type="matching"><name><text><![CDATA[U2 L1 Q03 Registres i Memòries]]></text></name><questiontext format="html"><text><![CDATA[<p>Relaciona:</p>]]></text></questiontext><subquestion><text><![CDATA[Registres]]></text><answer><text><![CDATA[Dins la CPU]]></text></answer></subquestion><subquestion><text><![CDATA[RAM]]></text><answer><text><![CDATA[Memòria temporal]]></text></answer></subquestion></question>
  <question type="multichoice"><name><text><![CDATA[U2 L1 Q04 Freqüència de Rellotge]]></text></name><questiontext format="html"><text><![CDATA[<p>GHz indica cicles per segon?</p>]]></text></questiontext><answer fraction="100"><text><![CDATA[Sí, és una mesura de velocitat.]]></text></answer></question>
  <question type="cloze"><name><text><![CDATA[U2 L1 Q05 Flux de dades]]></text></name><questiontext format="html"><text><![CDATA[<p>La {1:MULTICHOICE:=CPU~RAM} rep des d'Entrada i processa en RAM.</p>]]></text></questiontext></question>
  <question type="matching"><name><text><![CDATA[U2 L1 Q06 Tipus de Perifèrics]]></text></name><questiontext format="html"><text><![CDATA[<p>Classifica:</p>]]></text></questiontext><subquestion><text><![CDATA[Teclat]]></text><answer><text><![CDATA[Entrada]]></text></answer></subquestion><subquestion><text><![CDATA[Pantalla Tàctil]]></text><answer><text><![CDATA[Bidireccional]]></text></answer></subquestion></question>
  <question type="multichoice"><name><text><![CDATA[U2 L1 Q07 Memòria Virtual]]></text></name><questiontext format="html"><text><![CDATA[<p>Extensió de la RAM en disc dur?</p>]]></text></questiontext><answer fraction="100"><text><![CDATA[Correcte.]]></text></answer></question>
  <question type="truefalse"><name><text><![CDATA[U2 L1 Q08 Els Sockets]]></text></name><questiontext format="html"><text><![CDATA[<p>Són universals per a qualsevol CPU?</p>]]></text></questiontext><answer fraction="0"><text>true</text></answer><answer fraction="100"><text>false</text></answer></question>
  <question type="multichoice"><name><text><![CDATA[U2 L1 Q09 Connectors Placa]]></text></name><questiontext format="html"><text><![CDATA[<p>Estàndard per a targetes d'expansió?</p>]]></text></questiontext><answer fraction="100"><text><![CDATA[PCIe.]]></text></answer></question>
  <question type="truefalse"><name><text><![CDATA[U2 L1 Q10 GPU Integrada]]></text></name><questiontext format="html"><text><![CDATA[<p>GPU dins l'encapsulat de la CPU?</p>]]></text></questiontext><answer fraction="100"><text>true</text></answer></question>
  <question type="matching"><name><text><![CDATA[U2 L1 Q11 Volatilitat]]></text></name><questiontext format="html"><text><![CDATA[<p>Persistència:</p>]]></text></questiontext><subquestion><text><![CDATA[RAM]]></text><answer><text><![CDATA[Volàtil]]></text></answer></subquestion><subquestion><text><![CDATA[SSD]]></text><answer><text><![CDATA[No volàtil]]></text></answer></subquestion></question>
  <question type="cloze"><name><text><![CDATA[U2 L1 Q12 Resum Unitat]]></text></name><questiontext format="html"><text><![CDATA[<p>L'ALU executa. Els camins són {1:MULTICHOICE:=Bussos~Cables}.</p>]]></text></questiontext></question>
</quiz>`;

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const blob = new Blob([xmlContent], { type: 'application/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'U2_L1_Arquitectura_i_blocs.xml';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>

</html>
