<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarregador de Qüestionari Moodle - U2 L2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .tech-gradient {
            background: linear-gradient(135deg, #f59e0b 0%, #b45309 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glow-amber {
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.2);
        }
    </style>
</head>

<body class="bg-[#0f172a] min-h-screen flex items-center justify-center p-6 text-slate-200">
    <div class="max-w-xl w-full">
        <!-- Main Container -->
        <div class="glass-card rounded-[2.5rem] shadow-2xl overflow-hidden glow-amber">
            <!-- Header -->
            <div class="tech-gradient p-10 text-white relative">
                <div class="absolute top-0 right-0 p-8 opacity-20">
                    <svg class="w-20 h-20" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M19 14V6c0-1.1-.9-2-2-2H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zm-2 0H3V6h14v8zm-7-7c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm0 4c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z" />
                    </svg>
                </div>
                <div class="relative z-10">
                    <h2 class="text-sm font-bold uppercase tracking-[0.2em] mb-2 opacity-80">Unitat 2 / Lliçó 2</h2>
                    <h1 class="text-4xl font-extrabold tracking-tight">Eines i Seguretat</h1>
                </div>
            </div>

            <!-- Content -->
            <div class="p-10 space-y-8">
                <div class="flex items-center justify-between text-sm">
                    <div
                        class="flex items-center space-x-2 bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700">
                        <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                        <span class="font-medium">Preguntes de Lliçó 2</span>
                    </div>
                    <div class="text-slate-400">Nivell: <span class="text-slate-100 font-semibold">Bàsic</span></div>
                </div>

                <div class="space-y-4">
                    <div class="flex items-start space-x-4 p-4 rounded-3xl bg-slate-800/30 border border-slate-700/50">
                        <div class="p-3 bg-amber-500/10 rounded-2xl text-amber-500">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                            </svg>
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-100">Seguretat</h4>
                            <p class="text-sm text-slate-400 leading-relaxed">Descàrregues electroestàtiques (ESD) i
                                Polseres antiestàtiques.</p>
                        </div>
                    </div>

                    <div class="flex items-start space-x-4 p-4 rounded-3xl bg-slate-800/30 border border-slate-700/50">
                        <div class="p-3 bg-red-500/10 rounded-2xl text-red-500">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-100">Eines i Cargols</h4>
                            <p class="text-sm text-slate-400 leading-relaxed">Tipus de tornavisos, cargolam, brides i
                                brancaments.</p>
                        </div>
                    </div>
                </div>

                <!-- Action -->
                <a href="U2_L2_Eines_i_Seguretat.xml" download="U2_L2_Eines_i_Seguretat.xml"
                    class="w-full tech-gradient hover:brightness-110 text-white font-bold py-5 rounded-[2rem] shadow-[0_10px_40px_-10px_rgba(245,158,11,0.3)] transform transition-active active:scale-95 flex items-center justify-center text-xl tracking-tight cursor-pointer">
                    <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    DESCÀRREGA XML U2_L2
                </a>

                <p class="text-center text-slate-500 text-xs font-medium uppercase tracking-widest italic pt-4">
                    Manteniment d'Equips · Unitat 2 (L2)</p>
            </div>
        </div>
    </div>
</body>

</html>
